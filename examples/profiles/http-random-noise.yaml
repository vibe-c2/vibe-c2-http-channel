profile_id: 107
profile_label: http-random-noise
enabled: true
action:
  type: sync
mapping:
  id:
    target:
      location: header
      key: X-Request-ID
  encrypted_data_in:
    target:
      location: body
      key: payload
    transform:
      - type: base64
  encrypted_data_out:
    target:
      location: body
      key: payload
    transform:
      - type: base64
noise:
  inbound:
    - target:
        location: header
        key:
          type: alphanumeric
          length: 8
          prefix: "X-"
      value:
        type: hex
        length: 16
      count: 3
  outbound:
    - target:
        location: header
        key:
          type: alphanumeric
          length: 10
          prefix: "X-"
      value:
        type: alphanumeric
        length: 24
      count: 2
