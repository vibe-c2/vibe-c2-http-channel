profile_id: 101
profile_label: http-cdn-blend
enabled: true
action:
  type: sync
mapping:
  profile_id:
    target:
      location: header
      key: X-Correlation-ID
    transform:
      - type: prefix
        value: "cor-"
  id:
    target:
      location: header
      key: X-Request-ID
    transform:
      - type: base64url
  encrypted_data_in:
    target:
      location: body
      key: data
    transform:
      - type: base64
  encrypted_data_out:
    target:
      location: body
      key: data
    transform:
      - type: base64
