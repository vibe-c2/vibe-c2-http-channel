# Implant sends: POST /api/data
#   Header "X-Request-ID: <id>"
#   Header "X-Trace-ID: <uuid>"          <- inbound noise
#   Query  "_ref=<random>"               <- inbound noise
#   Body   {"data": "<base64(encrypted_data)>"}
# Channel returns:
#   Header "X-Cache-Status: HIT|MISS|EXPIRED"  <- outbound noise
#   Body   {"data": "<base64(encrypted_data)>"}

profile_id: 10
profile_label: http-with-noise
enabled: true
action:
  type: sync
mapping:
  id:
    target:
      location: header
      key: X-Request-ID
  encrypted_data_in:
    target:
      location: body
      key: data
    transform:
      - type: base64
  encrypted_data_out:
    target:
      location: body
      key: data
    transform:
      - type: base64
noise:
  inbound:
    - target:
        location: header
        key: X-Trace-ID
      value:
        type: uuid
    - target:
        location: query
        key: _ref
      value:
        type: alphanumeric
        length: 8
  outbound:
    - target:
        location: header
        key: X-Cache-Status
      value:
        type: choice
        values: ["HIT", "MISS", "EXPIRED"]
