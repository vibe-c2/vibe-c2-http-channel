profile_id: 106
profile_label: http-cdn-noise
enabled: true
action:
  type: sync
mapping:
  profile_id:
    target:
      location: header
      key: X-Correlation-ID
    transform:
      - type: prefix
        value: "cor-"
  id:
    target:
      location: header
      key: X-Request-ID
    transform:
      - type: base64url
  encrypted_data_in:
    target:
      location: body
      key: data
    transform:
      - type: base64
  encrypted_data_out:
    target:
      location: body
      key: data
    transform:
      - type: base64
noise:
  inbound:
    - target:
        location: header
        key: X-Forwarded-For
      value:
        type: choice
        values: ["10.0.0.1", "172.16.0.50", "192.168.1.100"]
    - target:
        location: header
        key: X-Client-Version
      value:
        type: alphanumeric
        length: 6
        prefix: "v"
    - target:
        location: query
        key: _ts
      value:
        type: timestamp_ms
  outbound:
    - target:
        location: header
        key: X-Cache
      value:
        type: choice
        values: ["HIT", "MISS", "EXPIRED", "STALE"]
    - target:
        location: header
        key: X-Served-By
      value:
        type: alphanumeric
        length: 12
        prefix: "node-"
    - target:
        location: header
        key: X-Response-Time
      value:
        type: range
        min: 5
        max: 250
        suffix: "ms"
