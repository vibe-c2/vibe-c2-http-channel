profile_id: 100
profile_label: http-json-api
enabled: true
action:
  type: sync
mapping:
  profile_id:
    target:
      location: header
      key: X-Api-Version
    transform:
      - type: prefix
        value: "v"
  id:
    target:
      location: body
      key: request_id
  encrypted_data_in:
    target:
      location: body
      key: payload
    transform:
      - type: base64
  encrypted_data_out:
    target:
      location: body
      key: payload
    transform:
      - type: base64
