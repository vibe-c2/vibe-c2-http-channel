profile_id: default
channel_type: http
enabled: true
priority: 100
mapping:
  profile_id:
    source: profile_id
    target:
      location: cookie
      key: p
    transform:
      - type: base64
  id:
    source: id
    target:
      location: cookie
      key: i
    transform:
      - type: base64
  encrypted_data_in:
    source: encrypted_data
    target:
      location: body
      key: ""
  encrypted_data_out:
    source: encrypted_data
    target:
      location: body
      key: ""
