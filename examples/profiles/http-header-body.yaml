# Implant sends: POST /api/data  Header "X-Request-ID: <id>"  Body {"data": "<encrypted_data>"}
# Channel returns: {"data": "<encrypted_data>"}

profile_id: 3
profile_label: http-header-body
enabled: true
action:
  type: sync
mapping:
  id:
    target:
      location: header
      key: X-Request-ID
  encrypted_data_in:
    target:
      location: body
      key: data
  encrypted_data_out:
    target:
      location: body
      key: data
